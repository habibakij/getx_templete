name: price_sense
description: A market-standard Flutter app with GetX architecture.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  get: ^4.6.6
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  iconsax: ^0.0.8
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^7.1.1
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  mobile_scanner: ^7.2.0
  crypto: ^3.0.7
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  flex_color_picker: ^3.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/logo/
    - assets/images/
